<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<title>WriteHabit Design — Print</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="styles.css" />
<style>
  html, body {
    margin: 0; padding: 0;
    background: #e9e5da;
    font-family: 'Pretendard Variable', system-ui, sans-serif;
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }
  .page {
    width: 1280px;
    margin: 0 auto 32px;
    background: var(--paper, #f2efe7);
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    overflow: hidden;
    position: relative;
    break-inside: avoid;
    break-after: page;
    page-break-after: always;
  }
  .page.mobile {
    width: 440px;
  }
  .page.login {
    height: 820px;
  }
  .page .wh { overflow: visible !important; }

  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 14px 22px 12px;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: 10px;
    color: #6a6558;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    border-bottom: 1px solid rgba(27,26,21,0.1);
    background: #fbf9f3;
  }
  .page-header .label {
    font-family: 'Fraunces', serif;
    font-weight: 600;
    font-size: 13px;
    letter-spacing: -0.01em;
    color: #1b1a15;
    text-transform: none;
  }

  @page {
    size: 1280px 1800px;
    margin: 0;
  }
  @media print {
    body { background: #fff; }
    .page {
      margin: 0;
      box-shadow: none;
      width: 100%;
      break-after: page;
      page-break-after: always;
    }
    .page.mobile { width: 100%; }
    .page-header { border-bottom: 1px solid rgba(27,26,21,0.15); }
  }

  .cover {
    width: 1280px;
    height: 1000px;
    margin: 0 auto 32px;
    background: #f2efe7;
    padding: 120px 80px;
    box-sizing: border-box;
    break-after: page;
    page-break-after: always;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .cover h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 120px;
    letter-spacing: -0.04em;
    line-height: 0.95;
    color: #1b1a15;
    margin: 0;
  }
  .cover h1 em { font-style: normal; color: #d94615; }
  .cover .sub {
    font-family: 'Gowun Batang', 'Noto Serif KR', serif;
    font-size: 28px;
    color: #2e2c25;
    margin-top: 32px;
    max-width: 600px;
    line-height: 1.5;
  }
  .cover .meta {
    display: flex;
    justify-content: space-between;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: #6a6558;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    border-top: 1px solid #1b1a15;
    padding-top: 24px;
  }
</style>
</head>
<body>

<div id="cover" class="cover">
  <div>
    <div style="font-family:'JetBrains Mono', monospace; font-size:13px; color:#6a6558; letter-spacing:0.2em; text-transform:uppercase; margin-bottom:40px;">— Design Exploration · 2026·04·23 —</div>
    <h1>Write<em>Habit</em></h1>
    <p class="sub">매일 하나의 키워드, 당신의 짧은 글 — 웹사이트 디자인 제안</p>
  </div>
  <div class="meta">
    <span>No. 01</span>
    <span>Paper · Serif · Content-first</span>
    <span>10 Screens</span>
  </div>
</div>

<div id="pages"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens/FeedScreen.jsx"></script>
<script type="text/babel" src="screens/WriteScreen.jsx"></script>
<script type="text/babel" src="screens/DetailScreen.jsx"></script>
<script type="text/babel" src="screens/ProfileScreen.jsx"></script>
<script type="text/babel" src="screens/ArchiveScreen.jsx"></script>
<script type="text/babel" src="screens/LoginScreen.jsx"></script>
<script type="text/babel" src="screens/MobileScreens.jsx"></script>
<script type="text/babel" src="screens/AdminKeywordsScreen.jsx"></script>

<script type="text/babel" data-presets="react">
const PAGES = [
  { id: 'feed',    no: '01', label: '메인 피드',          h: 1400, C: FeedScreen },
  { id: 'write',   no: '02', label: '글쓰기 에디터',       h: 1180, C: WriteScreen },
  { id: 'detail',  no: '03', label: '글 상세 · 댓글',      h: 1720, C: DetailScreen },
  { id: 'profile', no: '04', label: '프로필 · 스트릭',     h: 1260, C: ProfileScreen },
  { id: 'archive', no: '05', label: '키워드 아카이브',     h: 1300, C: ArchiveScreen },
  { id: 'login',   no: '06', label: '로그인',             h: 820,  C: LoginScreen, klass: 'login' },
  { id: 'mfeed',   no: '07', label: '모바일 · 피드',       h: 820,  C: MobileFeed, klass: 'mobile' },
  { id: 'mwrite',  no: '08', label: '모바일 · 글쓰기',     h: 820,  C: MobileWrite, klass: 'mobile' },
  { id: 'curate',  no: '09', label: '키워드 큐레이션',     h: 1620, C: AdminKeywordsScreen },
];

function PrintApp() {
  return (
    <>
      {PAGES.map(p => {
        const C = p.C;
        return (
          <div key={p.id} className={'page ' + (p.klass || '')} style={{ height: p.h + 44 }}>
            <div className="page-header">
              <span>WriteHabit · Design · {p.no} / 09</span>
              <span className="label">{p.label}</span>
              <span>2026·04·23</span>
            </div>
            <div style={{ height: p.h, position: 'relative' }}>
              <C />
            </div>
          </div>
        );
      })}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('pages')).render(<PrintApp />);

// Auto-print when fonts + layout are ready
(async () => {
  try { await document.fonts.ready; } catch (e) {}
  setTimeout(() => {
    if (window.location.search.indexOf('noprint') === -1) window.print();
  }, 1200);
})();
</script>

</body>
</html>
